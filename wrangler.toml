# Cloudflare Worker (static assets + API routes) config
# Deploy:  npx wrangler deploy
# Local:   npx wrangler dev   (reads .dev.vars for secrets)

name = "moacollin"
compatibility_date = "2026-06-23"
main = "worker.js"

# Local dev server (`npx wrangler dev`) — http://localhost:8080
[dev]
port = 8080

# ---- Static site ----
# Only public/ is served as static assets, so worker.js, functions/, config and
# secrets are never exposed (and wrangler's file-watcher doesn't loop on its own
# .wrangler/ writes). The Worker runs only for non-asset requests (the /api/*).
[assets]
directory = "public"
binding = "ASSETS"

# ---- Non-secret site settings (safe to commit) ----
# Available in the Worker as env.SETTING_NAME.
[vars]
CONTACT_EMAIL = "info@moacollin.com"   # booking form recipient
MAIL_FROM = "noreply@moacollin.com"    # must be a sender on a MailerSend-verified domain
MAIL_FROM_NAME = "Moa Collin – webb"
BOOKING_ENABLED = "false"   # flip to "true" once Stripe is wired up
CURRENCY = "sek"

# ---- Secrets (DO NOT put here) ----
# Set via dashboard (Settings → Variables and Secrets → mark as "Secret")
# or CLI:
#   npx wrangler secret put MAILERSEND_API_KEY    # booking form email
#   npx wrangler secret put STRIPE_SECRET_KEY
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET
# Locally they come from .dev.vars (git-ignored). See .dev.vars.example.
